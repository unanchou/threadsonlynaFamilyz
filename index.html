async function runProxyDiag(){
  const panel=$('diag-panel');
  const rows=$('diag-rows');
  panel.classList.add('show');
  rows.innerHTML='<div style="font-size:13px;color:var(--ink3)">測試中，請稍候（約 15 秒）…</div>';
  const testUrl='https://www.threads.com/@07o9i9';
  const proxies=[
    {name:'corsproxy.io', fn:async()=>{const r=await fetch(`https://corsproxy.io/?url=${encodeURIComponent(testUrl)}`);return {ok:r.ok,txt:await r.text()};}},
    {name:'allorigins',   fn:async()=>{const r=await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(testUrl)}`);const d=await r.json();return {ok:r.ok,txt:d.contents||''};}},
    {name:'codetabs',     fn:async()=>{const r=await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(testUrl)}`);return {ok:r.ok,txt:await r.text()};}},
    {name:'cors.sh',      fn:async()=>{const r=await fetch(`https://proxy.cors.sh/${testUrl}`);return {ok:r.ok,txt:await r.text()};}},
  ];
  const results=[];
  for(const p of proxies){
    try{
      const tout=new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),12000));
      const {ok,txt}=await Promise.race([p.fn(),tout]);
      const hasOG=txt.includes('og:image')||txt.includes('og_image');
      results.push({name:p.name,ok:ok&&txt.length>200,hasOG,len:txt.length});
    }catch(e){
      results.push({name:p.name,ok:false,hasOG:false,err:e.message});
    }
  }
  rows.innerHTML=results.map(r=>`
    <div class="diag-row ${r.ok&&r.hasOG?'diag-ok':r.ok?'':'diag-fail'}">
      <span class="diag-name">${r.name}</span>
      <span class="diag-status">${r.err?'✗ '+r.err : r.ok?(r.hasOG?'✓ 可用，有找到圖片':'⚠ 連線成功但找不到 OG 圖'):'✗ HTTP 失敗'}</span>
    </div>`).join('');
  // auto-select best proxy
  const best=results.find(r=>r.ok&&r.hasOG);
  if(best){
    rows.innerHTML+=`<div style="font-size:13px;color:#2e9060;font-weight:600;padding:6px 10px;">✓ 將使用：${best.name}</div>`;
    localStorage.setItem('ia_best_proxy',best.name);
    toast('✓ 找到可用 proxy：'+best.name);
  } else {
    rows.innerHTML+=`<div style="font-size:13px;color:var(--rose);font-weight:600;padding:6px 10px;">⚠ 目前所有 proxy 都無法連線</div>`;
  }
}


// ── RENAME：標籤/收藏夾/類型 ──
function renameTag(oldName){
  const item=[...document.querySelectorAll('#manage-tags-list .manage-item')]
    .find(el=>el.dataset.tag===oldName);
  if(!item)return;
  const nameEl=item.querySelector('.mi-name');
  const input=document.createElement('input');
  input.className='mi-edit-input';input.value=oldName;
  nameEl.replaceWith(input);
  input.focus();input.select();
  const save2=()=>{
    const newName=input.value.trim();
    if(!newName||newName===oldName){renderSettingsLists();return;}
    if(tags.includes(newName)){toast('標籤名稱已存在');return;}
    tags=tags.map(t=>t===oldName?newName:t);
    posts=posts.map(p=>({...p,tags:(p.tags||[]).map(t=>t===oldName?newName:t)}));
    save();renderAll();renderSettingsLists();toast('✦ 已重新命名');
  };
  input.addEventListener('keydown',e=>{if(e.key==='Enter')save2();if(e.key==='Escape')renderSettingsLists();});
  input.addEventListener('blur',save2);
}

function renameFolder(oldName){
  const item=[...document.querySelectorAll('#manage-folders-list .manage-item')]
    .find(el=>el.dataset.folder===oldName);
  if(!item)return;
  const nameEl=item.querySelector('.mi-name');
  const input=document.createElement('input');
  input.className='mi-edit-input';input.value=oldName;
  nameEl.replaceWith(input);
  input.focus();input.select();
  const save2=()=>{
    const newName=input.value.trim();
    if(!newName||newName===oldName){renderSettingsLists();return;}
    if(folders.includes(newName)){toast('收藏夾名稱已存在');return;}
    folders=folders.map(f=>f===oldName?newName:f);
    posts=posts.map(p=>({...p,folder:p.folder===oldName?newName:p.folder}));
    if(currentFolder===oldName)currentFolder=newName;if(folderFilters.has(oldName)){folderFilters.delete(oldName);folderFilters.add(newName);}
    save();renderAll();renderSettingsLists();toast('✦ 已重新命名');
  };
  input.addEventListener('keydown',e=>{if(e.key==='Enter')save2();if(e.key==='Escape')renderSettingsLists();});
  input.addEventListener('blur',save2);
}

function renameType(typeId){
  const item=[...document.querySelectorAll('#manage-types-list .manage-item')]
    .find(el=>el.dataset.typeId===typeId);
  if(!item)return;
  const nameEl=item.querySelector('.mi-name');
  const input=document.createElement('input');
  input.className='mi-edit-input';input.value=nameEl.textContent;
  nameEl.replaceWith(input);
  input.focus();input.select();
  const save2=()=>{
    const newName=input.value.trim();
    if(!newName){renderSettingsLists();return;}
    const idx=types.findIndex(t=>t.id===typeId);if(idx<0)return;
    types[idx].name=newName;
    save();renderAll();renderSettingsLists();toast('✦ 已重新命名');
  };
  input.addEventListener('keydown',e=>{if(e.key==='Enter')save2();if(e.key==='Escape')renderSettingsLists();});
  input.addEventListener('blur',save2);
}

function customConfirm(msg, onOk, okLabel='確定', danger=true){
  const overlay=$('cfrm-overlay');
  const okBtn=$('cfrm-ok');
  $('cfrm-msg').textContent=msg;
  okBtn.textContent=okLabel;
  okBtn.style.background=danger?'var(--rose)':'var(--grad-main)';
  overlay.style.display='flex';
  const close=()=>{ overlay.style.display='none'; okBtn.replaceWith(okBtn.cloneNode(true)); $('cfrm-cancel').replaceWith($('cfrm-cancel').cloneNode(true)); rebindConfirmBtns(); };
  $('cfrm-ok').onclick=()=>{ close(); onOk(); };
  $('cfrm-cancel').onclick=close;
  overlay.onclick=(e)=>{ if(e.target===overlay)close(); };
  // focus ok btn for keyboard confirm
  setTimeout(()=>$('cfrm-ok').focus(),50);
}
function rebindConfirmBtns(){
  // re-attach after clone (called inside close())
}
